<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國小高年級隨機測驗挑戰系統</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --success-color: #2ECC71;
            --error-color: #E74C3C;
            --bg-color: #F5F7FA;
            --chinese-color: #E67E22;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .quiz-container {
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            padding: 30px;
            width: 100%;
            max-width: 600px;
            position: relative; /* 為了讓切換按鈕能定位 */
        }
        h1 {
            color: #333;
            text-align: center;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .menu-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 25px;
        }
        .menu-btn {
            padding: 20px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-btn.english { background-color: var(--primary-color); }
        .menu-btn.chinese { background-color: var(--chinese-color); }
        .menu-btn:hover { transform: scale(1.02); }
        
        /* 頂部控制列：包含進度與切換按鈕 */
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px dashed #E0E0E0;
            padding-bottom: 10px;
        }
        .progress {
            font-size: 14px;
            color: #666;
            font-weight: bold;
        }
        .switch-subject-btn {
            background-color: #7F8C8D;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .switch-subject-btn:hover {
            background-color: #95A5A6;
        }

        .question-box {
            font-size: 18px;
            color: #2C3E50;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: bold;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background-color: white;
            border: 2px solid #E0E0E0;
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 16px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: #F0F7FF;
        }
        .option-btn.correct {
            background-color: #E8F8F5;
            border-color: var(--success-color);
            color: #117A65;
        }
        .option-btn.wrong {
            background-color: #FDEDEC;
            border-color: var(--error-color);
            color: #943126;
        }
        .hint-box {
            margin-top: 20px;
            padding: 12px;
            background-color: #FFF9E6;
            border-left: 4px solid #F39C12;
            border-radius: 4px;
            font-size: 14px;
            color: #7F8C8D;
            display: none;
        }
        .next-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: none;
        }
        .result-box { text-align: center; display: none; }
        .score-text {
            font-size: 48px;
            color: var(--primary-color);
            font-weight: bold;
            margin: 20px 0;
        }
        .restart-btn {
            background-color: var(--success-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="menu-ui">
        <h1>🎒 國小高年級測驗挑戰 🎒</h1>
        <p style="text-align: center; color: #666;">請選擇今天想要挑戰的考卷科目：</p>
        <div class="menu-box">
            <button class="menu-btn english" onclick="selectSubject('英文')">🔤 英文 隨機挑戰 (20題)</button>
            <button class="menu-btn chinese" onclick="selectSubject('國文')">📖 國文 隨機挑戰 (20題)</button>
        </div>
    </div>

    <div id="quiz-ui" style="display: none;">
        <h1 id="quiz-title">🌟 挑戰中 🌟</h1>
        
        <div class="quiz-header">
            <div class="progress" id="progress">準備中...</div>
            <button class="switch-subject-btn" onclick="confirmSwitchSubject()">🔄 中途換科目</button>
        </div>

        <div class="question-box" id="question-text"></div>
        <div class="options-list" id="options-container"></div>
        <div class="hint-box" id="hint-container"></div>
        <button class="next-btn" id="next-button" onclick="nextQuestion()">下一題</button>
    </div>

    <div id="result-ui" class="result-box">
        <h1>🎉 測試完成 🎉</h1>
        <p>你的最終得分是：</p>
        <div class="score-text" id="score-display">0 / 0</div>
        <button class="restart-btn" onclick="backToMenu()">返回科目選單</button>
    </div>
</div>

<script>
    let allQuestions = [];     // 存放總題庫
    let currentQuizSet = [];   // 當前抽出的 20 題
    let currentIndex = 0;
    let score = 0;
    let selectedSubjectName = "";
    const TOTAL_QUESTIONS_TO_PLAY = 20; 

    // 讀取外部題庫
    async function loadQuestions() {
        try {
            const response = await fetch('questions.json?v=' + Date.now());
            allQuestions = await response.json();
        } catch (error) {
            alert('載入題庫失敗，請確認 questions.json 格式與路徑正確！');
            console.error(error);
        }
    }

    // 洗牌演算法
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 選擇科目
    function selectSubject(subject) {
        selectedSubjectName = subject;
        let filteredPool = allQuestions.filter(q => q.subject === subject);
        
        if (filteredPool.length === 0) {
            alert(`目前題庫內還沒有【${subject}】的題目喔！`);
            return;
        }

        document.getElementById('menu-ui').style.display = 'none';
        document.getElementById('quiz-ui').style.display = 'block';
        document.getElementById('quiz-title').innerText = `🌟 ${subject}隨機挑戰 🌟`;

        score = 0;
        currentIndex = 0;

        let shuffledPool = shuffle([...filteredPool]);
        currentQuizSet = shuffledPool.slice(0, Math.min(TOTAL_QUESTIONS_TO_PLAY, filteredPool.length));

        showQuestion();
    }

    // 【新增功能】中途換科目的安全確認視窗
    function confirmSwitchSubject() {
        // 跳出瀏覽器內建確認視窗
        const leave = confirm("確定要放棄這張考卷，換去寫別的科目嗎？（當前的分數不會被儲存喔！）");
        if (leave) {
            backToMenu(); // 使用者確認要換，帶回首頁選單
        }
    }

    // 顯示題目
    function showQuestion() {
        const currentQ = currentQuizSet[currentIndex];
        
        document.getElementById('progress').innerText = `第 ${currentIndex + 1} 題 / 共 ${currentQuizSet.length} 題`;
        document.getElementById('question-text').innerText = `【${currentQ.category}】${currentQ.question}`;
        
        document.getElementById('next-button').style.display = 'none';
        const hintBox = document.getElementById('hint-container');
        hintBox.style.display = 'none';

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        let shuffledOptions = shuffle([...currentQ.options]);

        shuffledOptions.forEach(option => {
            const button = document.createElement('button');
            button.className = 'option-btn';
            button.innerText = option;
            button.onclick = () => checkAnswer(button, option, currentQ.answer, currentQ.hint);
            optionsContainer.appendChild(button);
        });
    }

    // 檢查答案
    function checkAnswer(selectedButton, chosenOption, correctAnswer, hintText) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (chosenOption === correctAnswer) {
            selectedButton.classList.add('correct');
            score++;
        } else {
            selectedButton.classList.add('wrong');
            buttons.forEach(btn => {
                if (btn.innerText === correctAnswer) {
                    btn.classList.add('correct');
                }
            });
            if(hintText) {
                const hintBox = document.getElementById('hint-container');
                hintBox.innerText = `💡 複習小提示：${hintText}`;
                hintBox.style.display = 'block';
            }
        }

        const nextBtn = document.getElementById('next-button');
        if (currentIndex < currentQuizSet.length - 1) {
            nextBtn.innerText = '下一題';
        } else {
            nextBtn.innerText = '查看測驗成果';
        }
        nextBtn.style.display = 'block';
    }

    // 下一題
    function nextQuestion() {
        currentIndex++; 
        if (currentIndex < currentQuizSet.length) {
            showQuestion();
        } else {
            showEndScreen();
        }
    }

    // 結算
    function showEndScreen() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'block';
        document.getElementById('score-display').innerText = `${score} / ${currentQuizSet.length}`;
    }

    // 返回首頁選單
    function backToMenu() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result-ui').style.display = 'none';
        document.getElementById('menu-ui').style.display = 'block';
    }

    window.onload = loadQuestions;
</script>

</body>
</html>
